# Builds and packages the plugin with provenance attestation on tag push.
# See https://github.com/grafana/plugin-actions/tree/main/build-plugin
name: Build plugin

on:
  push:
    tags:
      - 'v*' # Run workflow on version tags, e.g. v1.1.0.

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/build-plugin@build-plugin/v1.0.2
        with:
          attestation: true
